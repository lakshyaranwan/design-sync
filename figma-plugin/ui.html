<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 12px; margin: 0; padding: 12px; color: #111; }
  h2 { font-size: 13px; margin: 12px 0 6px; }
  h3 { font-size: 12px; margin: 10px 0 4px; color: #333; }
  button { padding: 6px 12px; font-size: 12px; cursor: pointer; margin-right: 6px; }
  .status { color: #666; font-style: italic; margin: 8px 0; }
  .lib { background: #f5f5f5; padding: 8px; border-radius: 4px; margin: 6px 0; }
  .lib-name { font-weight: 600; }
  .count { color: #666; font-size: 11px; }
  ul { margin: 4px 0 8px 16px; padding: 0; max-height: 160px; overflow: auto; }
  li { margin: 2px 0; font-size: 11px; }
  .err { color: #b00; background: #fee; padding: 6px; border-radius: 4px; margin: 4px 0; font-size: 11px; }
  .empty { color: #999; font-style: italic; }
</style>
</head>
<body>
  <div>
    <button id="scan">Rescan</button>
    <button id="close">Close</button>
  </div>
  <div id="status" class="status">Initializing...</div>
  <div id="errors"></div>
  <div id="output"></div>

<script>
const $ = function (id) { return document.getElementById(id); };

$('scan').onclick = function () { parent.postMessage({ pluginMessage: { type: 'scan' } }, '*'); };
$('close').onclick = function () { parent.postMessage({ pluginMessage: { type: 'close' } }, '*'); };

function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return ({'&':'&amp;','<':'&lt;','>':'&gt;'})[c]; }); }

function render(data) {
  const out = $('output');
  const errs = $('errors');
  errs.innerHTML = '';
  (data.errors || []).forEach(function (e) {
    const d = document.createElement('div');
    d.className = 'err';
    d.textContent = e;
    errs.appendChild(d);
  });

  const libNames = Object.keys(data.librariesByName || {}).sort();
  if (libNames.length === 0) {
    out.innerHTML = '<div class="empty">No libraries detected. Make sure libraries are enabled in Assets &rarr; Libraries.</div>';
    return;
  }

  let html = '<h2>Attached Libraries (' + libNames.length + ')</h2>';
  libNames.forEach(function (lib) {
    const stats = data.librariesByName[lib];
    const vcs = (data.variableCollections || []).filter(function (v) { return v.libraryName === lib; });
    const comps = (data.components || []).filter(function (c) { return c.libraryName === lib; });

    html += '<div class="lib">';
    html += '<div class="lib-name">' + esc(lib) + '</div>';
    html += '<div class="count">' + stats.variableCollections + ' variable collections, ' + stats.components + ' components</div>';

    if (vcs.length) {
      html += '<h3>Variable Collections</h3><ul>';
      vcs.forEach(function (v) { html += '<li>' + esc(v.name) + '</li>'; });
      html += '</ul>';
    }
    if (comps.length) {
      html += '<h3>Components</h3><ul>';
      comps.forEach(function (c) { html += '<li>' + esc(c.name) + '</li>'; });
      html += '</ul>';
    }
    html += '</div>';
  });
  out.innerHTML = html;
}

window.onmessage = function (event) {
  const msg = event.data.pluginMessage;
  if (!msg) return;
  if (msg.type === 'status') { $('status').textContent = msg.message; }
  else if (msg.type === 'libraries') { render(msg.data); }
};
</script>
</body>
</html>
